name: Checks

on:
  pull_request:      # runs on every pull request
  workflow_dispatch: # allows manual runs from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: JavaScript has no syntax errors
        run: node --check app.js

      - name: Page links its script and styles
        run: |
          grep -q 'src="app.js"' index.html
          grep -q 'href="style.css"' index.html

      - name: Grid element exists
        run: grep -q 'id="grid"' index.html
