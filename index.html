<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claim a Square</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Claim a Square</h1>
    <p class="progress-label"><span id="count">0</span> of 100 squares claimed</p>
    <div class="progress"><div id="bar" class="progress-bar"></div></div>
    <button id="reset">Reset</button>
  </header>
  <main>
    <div id="grid" class="grid"></div>
  </main>
  <footer>
    <p>Built square by square, one pull request at a time.</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
